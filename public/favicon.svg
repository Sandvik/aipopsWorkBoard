<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AIPOPS Workboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Simple rounded tile -->
  <rect x="4.5" y="4.5" width="55" height="55" rx="14" fill="url(#bg)" stroke="#0f172a" stroke-opacity="0.10"/>

  <!-- Three signature tiles (readable at 16×16) -->
  <rect x="18" y="28" width="8.5" height="8.5" rx="2.6" fill="#3b82f6"/>
  <rect x="27.75" y="28" width="8.5" height="8.5" rx="2.6" fill="#22c55e"/>
  <rect x="37.5" y="28" width="8.5" height="8.5" rx="2.6" fill="#fb923c"/>
</svg>
